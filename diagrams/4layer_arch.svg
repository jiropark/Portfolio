<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" style="width:100%;height:auto;display:block;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="l4grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2a50;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="l3grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a2a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a1e08;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="l2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3028;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a2020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="l1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2a40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#101e30;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9aa3b0"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>
  <rect width="900" height="620" fill="none" stroke="#b8924a" stroke-width="1.5" stroke-opacity="0.3" rx="12"/>
  <text x="450" y="38" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="1">XAmir — 4-Layer Gameplay Architecture</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#b8924a" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="40" y="68" width="820" height="100" rx="8" fill="url(#l4grad)" stroke="#79aadf" stroke-width="1.5"/>
  <rect x="40" y="68" width="6" height="100" rx="3" fill="#79aadf"/>
  <text x="70" y="90" fill="#79aadf" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">LAYER 4 — HOST</text>
  <text x="70" y="110" fill="#e0e0e0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">AXAmirPlayerHost  /  AXAmirMonsterHost</text>
  <text x="70" y="130" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· ACharacter 래퍼 — UE 물리·메시·입력 소유</text>
  <text x="70" y="148" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· 게임 로직 없음 — 모든 로직을 Composer에 위임 (P12)</text>
  <line x1="450" y1="168" x2="450" y2="188" stroke="#9aa3b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="182" fill="#5a7a9a" font-family="Consolas, monospace" font-size="10">BeginPlay → SpawnActor(IXAmirComposerBase::InitializeWithHost)</text>
  <rect x="40" y="192" width="820" height="110" rx="8" fill="url(#l3grad)" stroke="#b8924a" stroke-width="1.5"/>
  <rect x="40" y="192" width="6" height="110" rx="3" fill="#b8924a"/>
  <text x="70" y="214" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">LAYER 3 — COMPOSER</text>
  <text x="70" y="234" fill="#e0e0e0" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">AXAmirPlayerComposer  /  AXAmirMonsterComposer</text>
  <text x="70" y="254" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· 모듈 생성·소유 · BB 생성 · FSMBundleManager 구동</text>
  <text x="70" y="272" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· Wire() — Messaging 구독 단일 집중점 (P7)  |  Host API 유일 호출자 (P13)</text>
  <text x="70" y="290" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· PlayerComposer: 모듈 20개, Messaging 핸들 41개</text>
  <line x1="450" y1="302" x2="450" y2="322" stroke="#9aa3b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="316" fill="#5a7a9a" font-family="Consolas, monospace" font-size="10">NewObject&lt;&gt;(this)  →  UFSMBundleManager</text>
  <rect x="40" y="326" width="820" height="90" rx="8" fill="url(#l2grad)" stroke="#7fc4a0" stroke-width="1.5"/>
  <rect x="40" y="326" width="6" height="90" rx="3" fill="#7fc4a0"/>
  <text x="70" y="348" fill="#7fc4a0" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">FSM BUNDLE RUNTIME — UFSMBundleManager</text>
  <text x="70" y="368" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· Bundle + Gate 27개 등록·전환  |  ActiveBundle OnLoop 구동</text>
  <text x="70" y="386" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· IBundle (OnStart / OnLoop / OnEnd / ReceiveMessage)  |  IGate (OnBundleComplete / OnEntryRequest)</text>
  <text x="70" y="404" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11">· FSM_TransitionRequest 라우팅 — Messaging 경유 인터럽트 처리</text>
  <line x1="450" y1="416" x2="450" y2="436" stroke="#9aa3b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="430" fill="#5a7a9a" font-family="Consolas, monospace" font-size="10">Initialize(Composer, HostBB, GlobalBB)</text>
  <rect x="40" y="440" width="820" height="140" rx="8" fill="url(#l1grad)" stroke="#c8d8f0" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="40" y="440" width="6" height="140" rx="3" fill="#c8d8f0" fill-opacity="0.7"/>
  <rect x="46" y="446" width="490" height="128" rx="6" fill="#0a1628" fill-opacity="0.5"/>
  <text x="70" y="464" fill="#c8d8f0" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">LAYER 1 — MODULES  (UXAmirModuleBase · UObject)</text>
  <text x="70" y="482" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10">Player Core: CharStat / Movement / Animation / Crouch / CameraSystem / WeaponDraw / Stamina</text>
  <text x="70" y="498" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10">Player Combat: CombatDefense / Skill / Abnormal / Reaction / Stiffen</text>
  <text x="70" y="514" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10">Monster: Movement / Animation / CombatTarget / AICore / AIStrategy</text>
  <text x="70" y="534" fill="#5a8a6a" font-family="Consolas, monospace" font-size="10">// P2: 모듈이 다른 모듈 헤더 직접 include 금지</text>
  <text x="70" y="550" fill="#5a8a6a" font-family="Consolas, monospace" font-size="10">// 모든 모듈 간 통신은 GameplayMessageSubsystem 경유</text>
  <rect x="556" y="446" width="296" height="128" rx="6" fill="#0a1628" fill-opacity="0.5" stroke="#b8924a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="704" y="468" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" text-anchor="middle">LAYER 2 — BLACKBOARD</text>
  <text x="570" y="494" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10">UXAmirCharBlackboard</text>
  <text x="570" y="510" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9">  per-character · Composer 소유</text>
  <text x="570" y="530" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10">UXAmirGlobalBlackboard</text>
  <text x="570" y="546" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9">  크로스-캐릭터 · GameInstance 소유</text>
  <text x="450" y="600" fill="#5a7a9a" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">WemadeM · XAmir · UE5 C++ · 설계: 박지로</text>
</svg>
