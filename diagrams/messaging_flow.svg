<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="width:100%;height:auto;display:block;">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b8924a"/>
    </marker>
    <marker id="arr4r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c87060"/>
    </marker>
    <marker id="arr4g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fc4a0"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg4)" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#b8924a" stroke-width="1.5" stroke-opacity="0.3" rx="12"/>
  <text x="450" y="36" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="1">XAmir — Messaging 기반 모듈 통신 구조</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#b8924a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="450" y="70" fill="#9aa3b0" font-family="Consolas, monospace" font-size="11" text-anchor="middle">P2: 모듈간 직접 include 금지 · P13: Host 호출은 Composer만 · P7: 구독은 Wire()에서만</text>
  <!-- Module A -->
  <rect x="40" y="100" width="160" height="80" rx="8" fill="#0f1e35" stroke="#79aadf" stroke-width="1.5"/>
  <text x="120" y="122" fill="#79aadf" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Module A</text>
  <text x="120" y="140" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">e.g. StaminaSystem</text>
  <text x="120" y="156" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">BB.Stamina 감소</text>
  <text x="120" y="170" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">→ Publish 메시지</text>
  <!-- Module B -->
  <rect x="40" y="220" width="160" height="80" rx="8" fill="#0f1e35" stroke="#79aadf" stroke-width="1.5"/>
  <text x="120" y="242" fill="#79aadf" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Module B</text>
  <text x="120" y="260" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">e.g. CombatAbnormal</text>
  <text x="120" y="276" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">BB 쓰기 → Publish</text>
  <line x1="200" y1="140" x2="316" y2="178" stroke="#b8924a" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="240" y="155" fill="#b8924a" font-family="Consolas, monospace" font-size="9">Publish()</text>
  <line x1="200" y1="260" x2="316" y2="220" stroke="#b8924a" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="240" y="256" fill="#b8924a" font-family="Consolas, monospace" font-size="9">Publish()</text>
  <!-- GMS -->
  <rect x="316" y="156" width="268" height="86" rx="10" fill="#1a2808" stroke="#7fc4a0" stroke-width="2"/>
  <text x="450" y="178" fill="#7fc4a0" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">GameplayMessageSubsystem</text>
  <text x="450" y="196" fill="#9aa3b0" font-family="Consolas, monospace" font-size="10" text-anchor="middle">UGameplayMessageSubsystem</text>
  <text x="450" y="214" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">태그 기반 라우팅 · 브로드캐스트</text>
  <text x="450" y="230" fill="#3a5a3a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">// P7: RegisterListener는 Wire()에서만</text>
  <line x1="584" y1="198" x2="672" y2="198" stroke="#7fc4a0" stroke-width="1.5" marker-end="url(#arr4g)"/>
  <text x="608" y="190" fill="#7fc4a0" font-family="Consolas, monospace" font-size="9">Dispatch</text>
  <!-- Composer -->
  <rect x="672" y="140" width="188" height="116" rx="8" fill="#2a1e08" stroke="#b8924a" stroke-width="2"/>
  <text x="766" y="162" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Composer</text>
  <text x="766" y="180" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">Wire() 에서 구독 등록</text>
  <text x="766" y="197" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">핸들러 41개 (Player)</text>
  <text x="766" y="214" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">메시지 수신 → 처리</text>
  <text x="766" y="230" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">Host API 호출 (P13)</text>
  <text x="766" y="246" fill="#3a5a3a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">// 유일한 Host 접근자</text>
  <line x1="766" y1="256" x2="766" y2="310" stroke="#c87060" stroke-width="1.5" marker-end="url(#arr4r)"/>
  <text x="776" y="286" fill="#c87060" font-family="Consolas, monospace" font-size="9">Host API 호출 (P13)</text>
  <!-- Host -->
  <rect x="672" y="310" width="188" height="60" rx="8" fill="#1a1015" stroke="#c87060" stroke-width="1.5"/>
  <text x="766" y="334" fill="#c87060" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Host (ACharacter)</text>
  <text x="766" y="352" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">UE 물리 · 메시 조작</text>
  <!-- Forbidden arrow -->
  <line x1="200" y1="200" x2="660" y2="340" stroke="#c87060" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.4"/>
  <text x="380" y="300" fill="#c87060" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" transform="rotate(-22, 380, 300)">X 직접 접근 금지 (P12/P13)</text>
  <!-- BB note -->
  <rect x="40" y="330" width="260" height="56" rx="8" fill="#0a1628" stroke="#b8924a" stroke-width="1" stroke-opacity="0.3"/>
  <text x="170" y="350" fill="#b8924a" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Blackboard 원칙</text>
  <text x="170" y="367" fill="#9aa3b0" font-family="Consolas, monospace" font-size="9.5" text-anchor="middle">각 모듈은 자신 소유 BB 필드만 읽기/쓰기</text>
  <text x="170" y="381" fill="#5a7a9a" font-family="Consolas, monospace" font-size="9" text-anchor="middle">타 모듈 BB 접근 → Messaging 경유</text>
  <text x="450" y="408" fill="#5a7a9a" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">WemadeM · XAmir · UE5 C++ · 설계: 박지로</text>
</svg>
